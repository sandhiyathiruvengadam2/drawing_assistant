<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Canvas Size</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='canvas_size.css') }}">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dashboard-page">

    <div class="top-bar">
        <a href="/" class="back-btn">← Back to Dashboard</a>
        <h1>Select Canvas Size</h1>
        <p>Create a new canvas with your preferred size</p>
    </div>

    <div class="canvas-grid">

        <div class="canvas-card" onclick="selectCanvas(1080,1080)">
            <i class="fa-solid fa-square"></i>
            <h3>Square</h3>
            <p>1080 × 1080</p>
        </div>

        <div class="canvas-card" onclick="selectCanvas(1920,1080)">
            <i class="fa-solid fa-table-cells-large"></i>
            <h3>HD</h3>
            <p>1920 × 1080</p>
        </div>

        <div class="canvas-card" onclick="selectCanvas(2480,3508)">
            <i class="fa-solid fa-file"></i>
            <h3>A4</h3>
            <p>2480 × 3508</p>
        </div>

        <div class="canvas-card" onclick="selectCanvas(2550,3300)">
            <i class="fa-solid fa-file"></i>
            <h3>A3</h3>
            <p>2550 × 3300</p>
        </div>

        <div class="canvas-card" onclick="selectCanvas(4000,4000)">
            <i class="fa-solid fa-expand"></i>
            <h3>Large Square</h3>
            <p>4000 × 4000</p>
        </div>
        <div class="canvas-card custom-card">
    <i class="fa-solid fa-ruler-combined"></i>
    <h3>Custom Size</h3>

    <div class="custom-inputs">
        <input type="number" id="customWidth" placeholder="Width (px)">
        <input type="number" id="customHeight" placeholder="Height (px)">
        <button onclick="createCustomCanvas()">Create</button>
    </div>
</div>
    </div>

    <script>
function selectCanvas(w, h) {
    window.location.href = `/draw?width=${w}&height=${h}`;
}

function createCustomCanvas() {
    const w = document.getElementById("customWidth").value;
    const h = document.getElementById("customHeight").value;

    if (!w || !h) {
        alert("Please enter both width and height");
        return;
    }

    window.location.href = `/draw?width=${w}&height=${h}`;
}
</script>

</body>
</html>
